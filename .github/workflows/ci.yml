name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --dev --all-packages
      - run: uv run ruff check src/backend
      - run: uv run ruff format --check src/backend

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --dev --all-packages
      - run: uv run mypy src/backend/src

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pke
          POSTGRES_PASSWORD: pke  # pragma: allowlist secret
          POSTGRES_DB: pke_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --dev --all-packages
      - run: uv run pytest --tb=short -q
        env:
          PKE_DATABASE_URL: postgresql+asyncpg://pke:pke@localhost:5432/pke_test  # pragma: allowlist secret
