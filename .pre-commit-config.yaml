repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: "\\.canonical-bytes$"
      - id: end-of-file-fixer
        exclude: "\\.canonical-bytes$"
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: "^(src/shared/test_vectors/.*\\.json|src/shared/tools/generate_vectors\\.py)$"

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: "^(context/examples/.*\\.json|src/shared/test_vectors/.*\\.json|src/shared/tools/generate_vectors\\.py)$"
