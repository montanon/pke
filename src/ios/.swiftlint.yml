  - type_name
  - unavailable_condition
  - unneeded_break_in_switch
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - unused_closure_parameter
  - unused_control_flow_label
  - unused_enumerated
  - unused_optional_binding
  - unused_setter_value
  - valid_ibinspectable
  - vertical_parameter_alignment
  - vertical_whitespace
  - void_function_in_ternary
  - void_return
  - xctfail_message
  - yoda_condition

force_cast: error
force_try: error
force_unwrapping: error
implicitly_unwrapped_optional:
  severity: error

line_length:
  warning: 120
  error: 150

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 40
  error: 80

cyclomatic_complexity:
  warning: 10
  error: 15

nesting:
  type_level: 2
  function_level: 3

identifier_name:
  min_length: 2
  max_length: 50

excluded:
  - DerivedData
  - Pods
  - .build
  - PKE.xcodeproj
